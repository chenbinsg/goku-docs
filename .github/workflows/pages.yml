name: Deploy Docs to GitHub Pages

on:
  workflow_dispatch:  # manual only — docs are read directly on GitHub as markdown

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build site
        run: |
          mkdir -p _site
          find . -name "*.md" -not -path "./.git/*" -not -path "./_site/*" | while read f; do
            dir="_site/$(dirname "$f")"; mkdir -p "$dir"; cp "$f" "$dir/"; done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
